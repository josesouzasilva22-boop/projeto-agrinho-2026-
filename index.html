<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌱 Agro Quest | Calculadora de Sementes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>🌱 Agro Quest</h1>
    <p>Calculadora de Sementes para Produtores Rurais</p>
  </header>

  <main>
    <div class="calculator">
      <label for="cultura">Cultura:</label>
      <select id="cultura">
        <option value="">Selecione a cultura</option>
        <option value="soja">Soja</option>
        <option value="milho">Milho</option>
        <option value="feijao">Feijão</option>
        <option value="trigo">Trigo</option>
         </select>

      <label for="area">Área (hectares):</label>
      <input type="number" id="area" placeholder="Ex: 50" min="1">

      <button onclick="calcular()">Calcular Sementes</button>

      <div id="resultado" class="resultado"></div>
    </div>
  </main>

  <footer>
    <p>Feito por <strong>José</strong></p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
